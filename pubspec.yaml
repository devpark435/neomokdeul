name: neomokdeul
description: "너목들 - 너의 목소리가 들려. 온디바이스 Voice Cloning TTS 앱."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 상태관리
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 라우팅
  go_router: ^14.8.1

  # 로컬 저장
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Supabase (Auth + Storage)
  supabase_flutter: ^2.9.0

  # 환경변수
  flutter_dotenv: ^5.2.1

  # 오디오 녹음/재생
  record: ^6.2.0
  just_audio: ^0.9.43

  # 소셜 로그인
  google_sign_in: ^6.2.2

  # 유틸
  path_provider: ^2.1.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true

  assets:
    - .env
